pre-commit:
  commands:
    lint-fix:
      glob: "*.{ts,tsx}"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
    format-fix:
      glob: "*.{ts,tsx,js,jsx,json,css,md,yaml,yml}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    tcm:
      glob: "*.module.css"
      run: pnpm tcm
      stage_fixed: true
    tsc:
      glob: "*.{ts,tsx}"
      run: pnpm tsc
